name: ReceiptFolder
options:
  bundleIdPrefix: com.receiptfolder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true

targets:
  ReceiptFolder:
    type: application
    platform: iOS
    scheme:
      testTargets:
        - ReceiptFolderTests
        - ReceiptFolderUITests
    sources:
      - path: ReceiptFolder
      - path: Shared
    resources:
      - path: ReceiptFolder/Resources
    settings:
      base:
        INFOPLIST_FILE: ReceiptFolder/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.receiptfolder.app
        CODE_SIGN_ENTITLEMENTS: ReceiptFolder/Resources/ReceiptFolder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ReceiptFolderWidget
        embed: true
    entitlements:
      path: ReceiptFolder/Resources/ReceiptFolder.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.receiptfolder.app
        com.apple.security.application-groups:
          - group.com.receiptfolder.app

  ReceiptFolderWidget:
    type: app-extension
    platform: iOS
    scheme: {}
    sources:
      - path: ReceiptFolderWidget
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ReceiptFolderWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.receiptfolder.app.widget
        CODE_SIGN_ENTITLEMENTS: ReceiptFolderWidget/ReceiptFolderWidget.entitlements
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: ReceiptFolderWidget/ReceiptFolderWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.receiptfolder.app

  ReceiptFolderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ReceiptFolderTests
    dependencies:
      - target: ReceiptFolder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.receiptfolder.app.tests
        GENERATE_INFOPLIST_FILE: true

  ReceiptFolderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReceiptFolderUITests
    dependencies:
      - target: ReceiptFolder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.receiptfolder.app.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: ReceiptFolder
